name: Case sensitivity test

on:
  workflow_dispatch:
    inputs:
      system:
        description: "Select a system to build on"
        required: true
        type: choice
        options:
          - gadi
          - setonix

jobs:
  build:
    env:
      USER: ${{ secrets[format('{0}_USER', inputs.system)] }}
      SSHKEY: ${{ secrets[format('{0}_TESTING_KEY',inputs.system)] }}
      HOSTKEY: ${{ secrets[format('{0}_HOST_KEY',inputs.system)] }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup ssh
        uses: ./.github/actions/setup_ssh
        env:
          TEST_KEY: ${{ secrets[format('{0}_TESTING_KEY',inputs.system)] }}
          HOST_KEY: ${{ secrets[format('{0}_HOST_KEY',inputs.system)] }}
          USER: ${{ secrets[format('{0}_USER',inputs.system)] }}
        with:
          system: ${{ inputs.system }}
      - name: Try ssh
        shell: bash
        run: |
          ssh ${{ inputs.system }} '/bin/echo "hello there" > ~/my_test_file.txt'
